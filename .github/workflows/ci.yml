name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doclifts
          POSTGRES_PASSWORD: doclifts
          POSTGRES_DB: doclifts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doclifts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # drizzle.config.ts reads DATABASE_URL (dotenv/config); migrate uses this.
      # test-db.ts reads TEST_DATABASE_URL; integration tests use this.
      # Same target DB in CI — match the postgres service above.
      DATABASE_URL: postgresql://doclifts:doclifts@localhost:5432/doclifts_test
      TEST_DATABASE_URL: postgresql://doclifts:doclifts@localhost:5432/doclifts_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # drizzle-kit migrate — reads DATABASE_URL.
      - run: pnpm run db:migrate

      # svelte-kit sync + svelte-check.
      - run: pnpm run check

      - run: pnpm exec playwright install --with-deps chromium

      # Full suite — both vitest projects (server + browser).
      # Calling vitest directly avoids the package.json `test` script's
      # npm-inside-pnpm hop (`npm run test:unit -- --run`).
      - run: pnpm exec vitest run
