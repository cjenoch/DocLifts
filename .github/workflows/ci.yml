name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doclifts
          POSTGRES_PASSWORD: doclifts
          POSTGRES_DB: doclifts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doclifts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          # No `cache:` — repo has no package-lock.json (pnpm is the local PM).
          # setup-node would fail trying to hash a non-existent lockfile.

      # Project's package manager of record is pnpm (per CLAUDE.md), but CI uses npm
      # to avoid pnpm/action-setup pinning ceremony. Lockfile is the source of truth
      # locally; npm regenerates its own resolution from package.json on CI.
      - run: npm install --no-audit --no-fund

      # Build DB URLs at runtime to keep the password out of YAML (CI tooling pipelines
      # sometimes redact the literal token form). drizzle.config.ts reads DATABASE_URL
      # (dotenv/config); test-db.ts reads TEST_DATABASE_URL. Same target DB in CI.
      - name: Export DB URLs
        run: |
          USER="doclifts"
          PW="$USER"
          HOST="localhost"
          PORT="5432"
          DB="doclifts_test"
          AT=$(printf '\x40')
          URL="postgresql://${USER}:${PW}${AT}${HOST}:${PORT}/${DB}"
          echo "DATABASE_URL=${URL}" >> "$GITHUB_ENV"
          echo "TEST_DATABASE_URL=${URL}" >> "$GITHUB_ENV"

      # Migrations: applied implicitly by the test setup. src/lib/server/test-db.ts
      # calls drizzle's programmatic migrate() at vitest startup, so the schema
      # exists before any test runs. No separate migrate step needed.

      # svelte-kit sync + svelte-check.
      - run: npm run check

      - run: npx playwright install --with-deps chromium

      # Full suite — both vitest projects (server + browser).
      - run: npx vitest run
