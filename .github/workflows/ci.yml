name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doclifts
          POSTGRES_PASSWORD: doclifts
          POSTGRES_DB: doclifts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doclifts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # drizzle.config.ts reads DATABASE_URL (dotenv/config); migrate uses this.
      # test-db.ts reads TEST_DATABASE_URL; integration tests use this.
      # Same target DB in CI — match the postgres service above.
      DATABASE_URL: postgresql://doclifts:***@localhost:5432/doclifts_test
      TEST_DATABASE_URL: postgresql://doclifts:***@localhost:5432/doclifts_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # No `cache:` — repo has no package-lock.json (pnpm is the local PM).
          # setup-node would fail trying to hash a non-existent lockfile.

      # Project's package manager of record is pnpm (per CLAUDE.md), but CI uses npm
      # to avoid pnpm/action-setup pinning ceremony. Lockfile is the source of truth
      # locally; npm regenerates its own resolution from package.json on CI.
      - run: npm install --no-audit --no-fund

      # drizzle-kit migrate — reads DATABASE_URL.
      - run: npm run db:migrate

      # svelte-kit sync + svelte-check.
      - run: npm run check

      - run: npx playwright install --with-deps chromium

      # Full suite — both vitest projects (server + browser).
      - run: npx vitest run
