name: Browser CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Derive Playwright version from lockfile
        id: pw
        run: |
          PW_VER=$(node -e "const fs=require('fs'); const y=fs.readFileSync('pnpm-lock.yaml','utf8'); const m=y.match(/\/playwright@([0-9]+\.[0-9]+\.[0-9]+)/); if(!m){process.exit(1)}; console.log(m[1]);")
          echo "version=$PW_VER" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - run: pnpm run test:unit --project client
